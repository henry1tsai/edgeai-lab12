name: CI
on:
  push:
    branches: ["**"] # any branch
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Run ruff
        run: ruff check . --output-format=github

  test:
    name: Pytest smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install test deps
        run: pip install pytest==8.3.3
      - name: Run pytest
        run: pytest tests/ -v
